services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_scaffold
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./server
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_scaffold
      SECRET_KEY: app-scaffold-secret-change-in-prod
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: "false"
      ADK_BASE_URL: http://adk:8011
    ports:
      - "8000:8000"
    depends_on:
      - db
      - adk

  adk:
    build: ./adk-server
    environment:
      ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app_scaffold
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: "false"
    ports:
      - "8011:8011"
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
